# Warm-start HGCL-lite: full enhanced graph view + interaction graph view contrastive learning
processed_dir: data/processed_warm_bge_cooccur_m2_k50
hidden_dim: 128
num_layers: 2
scorer: dot
scorer_dropout: 0.1
encoder_dropout: 0.2
batch_size: 32
epochs: 50
lr: 0.001
weight_decay: 0.0001
device: cuda
checkpoint_path: outputs/checkpoints/recommender_warm_bge_cooccur_dualview_best.pt

use_text: true
fusion_mode: mlp
text_dropout: 0.1
text_weight: 0.5

# Keep your stable graph-text alignment as the basic auxiliary loss.
align_weight: 0.05
align_loss_type: mse
contrastive_temperature: 0.2
align_sample_size: 1024

# New HGCL-lite module: interaction view vs enhanced heterogeneous view.
use_view_contrast: true
view_contrast_weight: 0.005
view_contrast_temperature: 0.2
view_contrast_sample_size: 1024
view_contrast_target: api