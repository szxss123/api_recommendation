# Existing strict model config used only to locate the processed directory.
reference_config: configs/finetune_mtfm_cold_strict_zscore_seed0.yaml

# Existing three-seed ablation outputs. The runner imports Graph-only and
# Graph+BGE from this file and verifies that BGE/Popularity match.
existing_ablation_by_seed: outputs/final_strict_ablation/summary/overall_by_seed.csv
existing_methods_to_merge:
  - Popularity
  - BGE
  - Graph-only
  - Graph+BGE

# Optional CSV for a separately adapted literature model such as MTFM.
# Required columns: method, seed, Recall@5, NDCG@5, HitRate@5, MAP@5,
# Recall@10, NDCG@10, HitRate@10, MAP@10
external_results_csv: ""

verification_tolerance: 0.00001
selection_seed: 0

deterministic_methods:
  - Popularity
  - TF-IDF
  - BM25
  - BGE
  - Category-Jaccard

collaborative_common:
  epochs: 250
  eval_every: 10
  patience: 6
  projection_temperature: 0.07
  device: cuda

# Small but defensible validation grids. Increase only if needed.
bpr_grid:
  latent_dim: [64, 128]
  knn_k: [10, 20]
  learning_rate: [0.01]
  regularization: [0.0001, 0.001]

lightgcn_grid:
  latent_dim: [64, 128]
  knn_k: [10, 20]
  learning_rate: [0.01]
  regularization: [0.0001]
  lightgcn_layers: [1, 2]

table_method_order:
  - Popularity
  - TF-IDF
  - BM25
  - Category-Jaccard
  - BGE
  - Inductive BPR-MF
  - Inductive LightGCN
  - Graph-only
  - Graph+BGE
  - MTFM
